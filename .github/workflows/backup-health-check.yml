name: Backup Health Check

# 매일 KST 08:00 (UTC 23:00 전날) 에 백업 상태를 점검한다.
# 실패 시 GitHub Issue 를 자동 생성 → 설정된 이메일로 알림.

on:
  schedule:
    - cron: '0 23 * * *'   # 매일 UTC 23:00 = KST 08:00
  workflow_dispatch:        # 수동 실행 버튼 (테스트용)

jobs:
  check-backup:
    name: 서버 백업 파일 점검
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: SSH 로 서버 백업 상태 확인
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          command_timeout: 2m
          script: |
            set -e
            BACKUP_DIR="/home/root/backups/haccp/db"

            echo "=== Millio AI 백업 헬스체크 ==="
            echo "대상 디렉토리: ${BACKUP_DIR}"
            echo

            if [ ! -d "${BACKUP_DIR}" ]; then
              echo "::error::백업 디렉토리가 존재하지 않습니다: ${BACKUP_DIR}"
              exit 1
            fi

            LATEST=$(ls -t "${BACKUP_DIR}"/*.sql.gz 2>/dev/null | head -1 || true)

            if [ -z "${LATEST}" ]; then
              echo "::error::*.sql.gz 백업 파일이 단 하나도 없습니다."
              exit 1
            fi

            AGE_MIN=$(( ( $(date +%s) - $(stat -c %Y "${LATEST}") ) / 60 ))
            SIZE_BYTES=$(stat -c %s "${LATEST}")
            SIZE_HUMAN=$(du -h "${LATEST}" | cut -f1)
            TOTAL_COUNT=$(ls -1 "${BACKUP_DIR}"/*.sql.gz 2>/dev/null | wc -l)

            echo "최신 백업:    $(basename "${LATEST}")"
            echo "생성 후 경과: ${AGE_MIN} 분"
            echo "파일 크기:    ${SIZE_BYTES} bytes (${SIZE_HUMAN})"
            echo "총 보관 개수: ${TOTAL_COUNT} 개"
            echo

            # ── 검증 규칙 ──
            # 1) 최신 백업이 26시간 이내여야 함 (cron: 매일 02:00)
            MAX_AGE_MIN=1560   # 26h = 1560min
            # 2) 파일 크기가 최소 10KB 이상 (354바이트 참사 재발 방지)
            MIN_SIZE_BYTES=10240

            FAIL=0

            if [ "${AGE_MIN}" -gt "${MAX_AGE_MIN}" ]; then
              echo "::error::백업이 너무 오래됨 — ${AGE_MIN}분 경과 (허용: ${MAX_AGE_MIN}분)"
              FAIL=1
            fi

            if [ "${SIZE_BYTES}" -lt "${MIN_SIZE_BYTES}" ]; then
              echo "::error::백업 파일이 너무 작음 — ${SIZE_BYTES}바이트 (최소: ${MIN_SIZE_BYTES}바이트). DB_NAME 환경변수 확인 필요."
              FAIL=1
            fi

            if [ "${FAIL}" -eq 1 ]; then
              echo
              echo "=== 최근 5개 백업 상세 ==="
              ls -lh "${BACKUP_DIR}" | tail -5
              exit 1
            fi

            echo "✅ 백업 정상: $(basename "${LATEST}") (${SIZE_HUMAN}, ${AGE_MIN}분 전)"

      - name: 실패 시 GitHub Issue 자동 생성
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toLocaleString('ko-KR', { timeZone: 'Asia/Seoul' });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const notifyEmail = '${{ secrets.NOTIFY_EMAIL }}';

            const body = [
              '## 🚨 백업 헬스체크 실패',
              '',
              `- **발생 시각 (KST)**: ${today}`,
              `- **워크플로우 로그**: [${context.runId}](${runUrl})`,
              `- **알림 대상**: ${notifyEmail}`,
              '',
              '### 가능한 원인',
              '',
              '1. **백업 cron 미실행** — 서버 cron daemon 중단 또는 crontab 변경됨',
              '2. **백업 파일이 너무 작음** — `DB_NAME` 환경변수 누락 (354바이트 참사 재발)',
              '3. **SSH 접속 실패** — 서버 다운 또는 방화벽/키 변경',
              '4. **디스크 가득 참** — `/home/root/backups/haccp/db/` 경로 마운트 이슈',
              '',
              '### 긴급 대응 절차',
              '',
              '```bash',
              '# 1. 서버 접속',
              'ssh root@49.50.130.101',
              '',
              '# 2. 최근 백업 파일 확인',
              'ls -lh /home/root/backups/haccp/db/ | tail -5',
              '',
              '# 3. cron 스케줄 확인',
              'crontab -l | grep backup',
              '',
              '# 4. 백업 로그 확인',
              'tail -50 /home/root/backups/haccp/backup.log',
              '',
              '# 5. 수동 백업 실행 (테스트)',
              'DB_NAME=haccp_tenant_db DB_PASSWORD=\'...\' /root/haccp_v3/scripts/backup.sh',
              '```',
              '',
              '### 복구 확인',
              '',
              '- [ ] 최신 백업 파일 크기 > 10KB 확인',
              '- [ ] 파일 내용에 `INSERT INTO` 문 포함되어 있는지 확인 (`zcat`)',
              '- [ ] 수동 복원 테스트 (다른 DB 로)',
              '- [ ] 다음 자동 백업(02:00 AM) 정상 동작 확인',
              '',
              '---',
              '*이 이슈는 `Backup Health Check` 워크플로우가 자동 생성했습니다.*'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 [자동알림] 백업 헬스체크 실패 - ${today.split(' ')[0]}`,
              body: body,
              labels: ['bug', 'critical', 'backup', 'automated']
            });
