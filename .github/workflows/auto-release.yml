name: Auto Release on Main

# main 에 push (PR 머지 포함) 될 때마다 자동으로 patch 버전을 올려서
# Release 를 publish 한다. 이 Release publish 가 deploy.yml 의 트리거가 되어
# Actions 빌드 + 자산 업로드 + 운영 배포까지 모두 자동 진행된다.
#
# 스킵 조건 (커밋 메시지 기준):
#   - "[no-release]" 가 들어있으면 release 안 만듦 (문서/설정 변경 등)
#   - "[skip ci]" / "[ci skip]" 가 들어있으면 안 만듦 (관례)
#   - 머지 커밋에 위 마커가 들어있으면 함께 적용됨
#
# 안전장치:
#   - permissions: contents:write (빌트인 토큰은 release 생성에만 사용)
#   - 실제 release publish 는 PAT_TOKEN 으로 → release.published 이벤트가
#     deploy.yml 트리거 가능 (GitHub 의 token-scoped event 정책 우회).
#     ※ 이 정책 때문에 PR-D2 (2026-04-27) 이전에는 v0.8.4~v0.8.6 이 published
#       됐어도 deploy.yml 이 안 돌았음. 반드시 PAT_TOKEN 사용 유지.
#   - tag 충돌 시 release 생성 실패 → 워크플로 fail (수동 개입 필요)
#   - timeout 5분 (충분히 짧음, 무한 대기 방어)

on:
  push:
    branches: [main]

permissions:
  contents: write   # gh release create 가 tag + release 생성

jobs:
  release:
    name: Patch 버전 자동 release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: >-
      !contains(github.event.head_commit.message, '[no-release]') &&
      !contains(github.event.head_commit.message, '[skip ci]') &&
      !contains(github.event.head_commit.message, '[ci skip]')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # tag 조회 위해 전체 히스토리 필요

      - name: 다음 버전 계산
        id: ver
        run: |
          set -eu

          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)

          if [ -z "$LATEST" ]; then
            NEXT="v0.1.0"
            REASON="첫 release (기존 태그 없음)"
          else
            VER="${LATEST#v}"
            MAJOR=$(echo "$VER" | cut -d. -f1)
            MINOR=$(echo "$VER" | cut -d. -f2)
            PATCH=$(echo "$VER" | cut -d. -f3)

            # 비표준 형식 방어 — patch 가 숫자가 아니면 fail
            if ! [[ "$PATCH" =~ ^[0-9]+$ ]]; then
              echo "::error::최신 태그 '$LATEST' 의 patch 부분이 숫자가 아닙니다 (수동 개입 필요)"
              exit 1
            fi

            NEXT="v${MAJOR}.${MINOR}.$((PATCH+1))"
            REASON="$LATEST → $NEXT (patch +1)"
          fi

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "reason=$REASON" >> "$GITHUB_OUTPUT"

          {
            echo "## 🏷️ 다음 버전"
            echo ""
            echo "- **이전**: \`${LATEST:-(없음)}\`"
            echo "- **신규**: \`$NEXT\`"
            echo "- **사유**: $REASON"
            echo "- **커밋**: \`${{ github.sha }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Release 생성 (PAT 사용 — release.published 트리거 가능)
        env:
          # PR-D2 (2026-04-27): GITHUB_TOKEN 으로 만든 release 는 보안 정책상
          #   다른 워크플로(release.published) 를 트리거하지 못함.
          #   PAT_TOKEN (Personal Access Token, contents:write 권한) 을 사용해야
          #   deploy.yml 이 자동으로 실행됨.
          # PAT_TOKEN 이 secrets 에 없으면 빌트인 GITHUB_TOKEN 으로 fallback —
          #   release 는 생성되지만 deploy.yml 은 수동 트리거가 필요해짐.
          GH_TOKEN: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          NEXT="${{ steps.ver.outputs.next }}"

          # 동일 태그가 이미 있으면 (수동 생성됐던 경우) 그냥 종료
          if gh release view "$NEXT" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "::notice::Release $NEXT 가 이미 존재. 스킵."
            exit 0
          fi

          # PAT_TOKEN 사용 여부 로깅 (보안: 토큰 값은 노출하지 않음)
          if [ -n "${{ secrets.PAT_TOKEN }}" ]; then
            echo "::notice::PAT_TOKEN 사용 — deploy.yml 자동 트리거 활성화"
          else
            echo "::warning::PAT_TOKEN 미설정 — GITHUB_TOKEN fallback. deploy.yml 은 수동 트리거 필요"
          fi

          gh release create "$NEXT" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "$NEXT" \
            --generate-notes \
            --notes "_자동 생성됨 — \`auto-release.yml\` (커밋 \`${{ github.sha }}\`)_"

          echo "✅ Release $NEXT 생성 — deploy.yml 자동 트리거됨"
